<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">

<style>
    .box { fill:#f4f4f4; stroke:#000; stroke-width:2; }
    .line { stroke:#000; stroke-width:2; }
    .text { font-family:Arial; font-size:18px; }
    .title { font-family:Arial; font-size:26px; font-weight:bold; }
</style>

<text x="400" y="40" class="title">Custom Truck Rear Lighting Harness</text>

<!-- Battery -->
<rect x="100" y="120" width="200" height="80" class="box"/>
<text x="150" y="165" class="text">12V Battery</text>

<!-- Main Fuse -->
<rect x="450" y="120" width="200" height="80" class="box"/>
<text x="500" y="165" class="text">30A Main Fuse</text>

<!-- Fuse Block -->
<rect x="800" y="80" width="250" height="200" class="box"/>
<text x="850" y="115" class="text">Fuse Block</text>
<text x="820" y="150" class="text">10A Tail</text>
<text x="820" y="180" class="text">15A Brake</text>
<text x="820" y="210" class="text">15A Turn</text>

<!-- Switches -->
<rect x="450" y="350" width="200" height="80" class="box"/>
<text x="485" y="395" class="text">Headlight Switch</text>

<rect x="750" y="350" width="200" height="80" class="box"/>
<text x="780" y="395" class="text">Brake Switch</text>

<rect x="1050" y="350" width="200" height="80" class="box"/>
<text x="1075" y="395" class="text">Flasher Relay</text>

<rect x="900" y="520" width="250" height="100" class="box"/>
<text x="930" y="570" class="text">Turn Signal Switch</text>

<!-- Rear Lights -->
<rect x="350" y="650" width="200" height="80" class="box"/>
<text x="390" y="695" class="text">Left Rear Light</text>

<rect x="750" y="650" width="200" height="80" class="box"/>
<text x="785" y="695" class="text">Right Rear Light</text>

<!-- Wiring Lines -->
<line x1="300" y1="160" x2="450" y2="160" class="line"/>
<line x1="650" y1="160" x2="800" y2="160" class="line"/>

<line x1="925" y1="280" x2="925" y2="350" class="line"/>
<line x1="875" y1="430" x2="875" y2="520" class="line"/>
<line x1="1150" y1="430" x2="1150" y2="520" class="line"/>

<line x1="1025" y1="620" x2="450" y2="650" class="line"/>
<line x1="1025" y1="620" x2="850" y2="650" class="line"/>

<!-- Ground Bus -->
<rect x="100" y="650" width="200" height="80" class="box"/>
<text x="140" y="695" class="text">Ground Bus</text>

<line x1="200" y1="200" x2="200" y2="650" class="line"/>

</svg>
